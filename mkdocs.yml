site_name: lackpy
site_description: Python that lacks most of Python. Restricted program generation and execution for tool composition.
site_url: https://lackpy.readthedocs.io

repo_url: https://github.com/teague/lackpy
repo_name: teague/lackpy

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - def_list

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Tutorial: tutorial.md
  - Concepts:
    - Architecture: concepts/architecture.md
    - Language Spec: concepts/language-spec.md
    - Kits & Toolbox: concepts/kits.md
    - Inference Pipeline: concepts/inference.md
    - Interpreter Plugins: concepts/interpreters.md
  - Extending:
    - Tool Providers: extending/tool-providers.md
    - Inference Providers: extending/inference-providers.md
    - Custom Rules: extending/custom-rules.md
  - Reference:
    - Python API: reference/api.md
    - CLI: reference/cli.md

extra_css:
  - css/extra.css
